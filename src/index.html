<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Work Status</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">🎮</span>
        <div>
          <h1>Discord Work Status</h1>
          <p class="subtitle">Rich Presence を自由に設定</p>
        </div>
      </div>
      <div class="conn">
        <input
          id="client-id"
          type="text"
          placeholder="Discord Application (Client) ID"
          autocomplete="off"
          spellcheck="false"
        />
        <label class="checkbox small">
          <input id="auto-connect" type="checkbox" />
          起動時に自動接続
        </label>
        <span id="status-badge" class="badge off">未接続</span>
        <button id="connect-btn" class="btn primary">接続</button>
      </div>
    </header>

    <main class="layout">
      <!-- プリセット一覧 -->
      <aside class="panel presets">
        <div class="panel-head">
          <h2>プリセット</h2>
          <button id="add-preset" class="btn tiny" title="プリセットを追加">＋</button>
        </div>
        <ul id="preset-list" class="preset-list"></ul>
      </aside>

      <!-- エディタ -->
      <section class="panel editor">
        <div class="panel-head">
          <h2 id="editor-title">編集</h2>
          <button id="delete-preset" class="btn tiny danger" title="このプリセットを削除">🗑</button>
        </div>

        <div class="form">
          <label class="field">
            <span>プリセット名</span>
            <input id="f-name" type="text" placeholder="仕事中" />
          </label>

          <label class="field">
            <span>詳細 (details) — 1 行目</span>
            <input id="f-details" type="text" maxlength="128" placeholder="仕事中" />
          </label>

          <label class="field">
            <span>状態 (state) — 2 行目</span>
            <input id="f-state" type="text" maxlength="128" placeholder="集中してます" />
          </label>

          <div class="grid2">
            <label class="field">
              <span>大画像キー (large image)</span>
              <input id="f-large-image" type="text" placeholder="work" />
            </label>
            <label class="field">
              <span>大画像ホバー文 (large text)</span>
              <input id="f-large-text" type="text" maxlength="128" placeholder="Working" />
            </label>
          </div>

          <div class="grid2">
            <label class="field">
              <span>小画像キー (small image)</span>
              <input id="f-small-image" type="text" placeholder="dot" />
            </label>
            <label class="field">
              <span>小画像ホバー文 (small text)</span>
              <input id="f-small-text" type="text" maxlength="128" placeholder="online" />
            </label>
          </div>

          <label class="checkbox">
            <input id="f-elapsed" type="checkbox" />
            経過時間を表示する（適用時からの経過を表示）
          </label>

          <fieldset class="buttons-field">
            <legend>ボタン（最大 2 個）</legend>
            <div class="grid2">
              <input id="f-btn1-label" type="text" placeholder="ボタン1 ラベル" maxlength="32" />
              <input id="f-btn1-url" type="text" placeholder="https://..." />
            </div>
            <div class="grid2">
              <input id="f-btn2-label" type="text" placeholder="ボタン2 ラベル" maxlength="32" />
              <input id="f-btn2-url" type="text" placeholder="https://..." />
            </div>
            <p class="hint">※ URL は https:// から始めてね</p>
          </fieldset>
        </div>
      </section>

      <!-- プレビュー -->
      <aside class="panel preview">
        <div class="panel-head"><h2>プレビュー</h2></div>
        <div class="presence-card">
          <p class="presence-head">プレイ中</p>
          <div class="presence-body">
            <div class="presence-images">
              <div id="pv-large" class="pv-large">🖼</div>
              <div id="pv-small" class="pv-small">•</div>
            </div>
            <div class="presence-text">
              <p id="pv-title" class="pv-title">アプリ名</p>
              <p id="pv-details" class="pv-line">詳細</p>
              <p id="pv-state" class="pv-line">状態</p>
              <p id="pv-elapsed" class="pv-line muted">00:00 経過</p>
            </div>
          </div>
          <div id="pv-buttons" class="pv-buttons"></div>
        </div>
        <p class="hint preview-note">
          ※ 画像はプレビューではキー名を表示。実際の見た目は Discord Developer Portal に
          アップロードしたアートアセットで決まるよ。
        </p>
      </aside>
    </main>

    <footer class="actionbar">
      <span id="toast" class="toast"></span>
      <div class="spacer"></div>
      <button id="clear-btn" class="btn ghost">プレゼンスを消す</button>
      <button id="apply-btn" class="btn primary big">この状態を適用</button>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
