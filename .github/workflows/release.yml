name: Release

# v から始まるタグを push したときだけ走る。
#   git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: build ${{ matrix.platform }} ${{ matrix.args }}
    permissions:
      contents: write # Release の作成と成果物の添付に必要
    strategy:
      fail-fast: false # 1 OS が落ちても他は最後まで作る
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin" # Apple Silicon
          - platform: macos-latest
            args: "--target x86_64-apple-darwin" # Intel Mac
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: install system dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # フロント自体はビルド不要だが、package.json の @tauri-apps/cli を
      # tauri-action に使わせるために入れる。
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: npm install

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Discord Work Status ${{ github.ref_name }}
          releaseBody: |
            Discord の Rich Presence を、仕事中・プログラミング中など好きなステータスに
            設定できるデスクトップアプリです。

            ## インストール

            下の **Assets** から、お使いの環境に合わせてダウンロードしてください。

            | 環境 | ファイル |
            | --- | --- |
            | Windows | `.msi`（推奨）または `-setup.exe` |
            | macOS (Apple Silicon) | `aarch64.dmg` |
            | macOS (Intel) | `x64.dmg` |
            | Linux (Debian / Ubuntu) | `.deb` |
            | Linux (Fedora / RHEL) | `.rpm` |
            | Linux (その他) | `.AppImage` |

            ## 動作要件

            Rich Presence は Discord のローカル IPC を利用します。**Discord デスクトップ
            アプリが起動している同じマシン**で実行してください。ブラウザ版の Discord では
            動作しません。

            ## インストール時の警告について

            本アプリは未署名のため、初回インストール時に OS の警告が表示されます。
            次の手順で続行できます。

            - **Windows** — 「WindowsによってPCが保護されました」と表示されたら、
              「**詳細情報**」→「**実行**」を選択してください。
            - **macOS** — Gatekeeper の警告が表示されたら、アプリを**右クリックして
              「開く」**を選択してください。

            ## 注意事項

            - `.AppImage` は WebKit / GTK のランタイムを同梱するため、他の形式に比べて
              ファイルサイズが大きくなっています。
          releaseDraft: true # 中身を確認してから手動で公開する
          prerelease: false
          args: ${{ matrix.args }}
