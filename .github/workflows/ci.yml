name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同じブランチに連続で push したとき、古い実行は止める
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt / clippy / build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      # Tauri v2 の Linux ビルドに必要な系。webkit2gtk は 4.0 ではなく 4.1。
      # libappindicator3-dev はシステムトレイ用。
      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # フロントは素の HTML/CSS/JS でビルド工程を持たないため npm install は不要。
      # build.rs は src/ をそのまま埋め込むだけ。
      - name: cargo fmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: cargo build
        run: cargo build
        working-directory: src-tauri
